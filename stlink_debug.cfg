# OpenOCD configuration for STM32H750 with ST-Link (HLA mode)
source [find interface/stlink.cfg]

set CHIPNAME stm32h750
set ENDIAN little

adapter speed 4000

# ST-Link uses HLA, do NOT call 'transport select' - it auto-selects hla_swd
# STM32H7 with ST-Link/HLA: use hla_target, not stm32h7x (which expects full JTAG/SWD)
set CPUTAPID 0

source [find target/stm32h7x.cfg]

reset_config srst_only

init
echo "Target initialized successfully!"