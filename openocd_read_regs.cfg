# OpenOCD read registers for ADC clock analysis
source [find interface/stlink.cfg]
adapter speed 4000
source [find target/stm32h7x.cfg]

init
halt

echo "=== RCC PLL3 ==="
echo "RCC_CR"
mdw 0x58024400 1
echo "RCC_PLLCKSELR"
mdw 0x58024408 1
echo "RCC_PLL3DIVR"
mdw 0x58024414 1
echo "RCC_PLL3FRACR"
mdw 0x58024418 1
echo "=== ADC Clock Source ==="
echo "RCC_D3CCIPR"
mdw 0x58024458 1
echo "=== ADC Common Clock ==="
echo "ADC12_COMMON_CCR"
mdw 0x40002304 1
echo "ADC3_COMMON_CCR"
mdw 0x58006304 1
echo "=== ADC1 Config ==="
echo "ADC1_CFGR"
mdw 0x40002208 1
echo "ADC1_SMPR1"
mdw 0x4000220C 1

resume
shutdown
