# OpenOCD configuration for STM32H750 with J-Link

# Source J-Link interface
source [find interface/jlink.cfg]

# Transport select
transport select swd

# Set adapter speed
adapter speed 4000

# Source STM32H7x target
source [find target/stm32h7x.cfg]

# Reset configuration
reset_config srst_only

# Auto-execution commands
init
echo "Target initialized successfully!"
echo "Now connecting USB cable to board..."
